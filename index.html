<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Fortune Chaos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1 class="title">🥠 Today's Fortune 🥠</h1>

    <div class="cookie-container">
        <img src="./cookie.png" id="cookie" onclick="startFortuneFlow()" alt="Fortune Cookie">
    </div>

    <div id="fortuneBox"></div>

    <img src="./michael.png" id="michaelFace" alt="Michael Scott">

    <div id="interactionZone">
        <div id="monkey">🐒</div>
        <div id="poopTrack"></div>
        <div id="toilet">🚽</div>
        <button id="flushBtn" onclick="flushToilet()">Flush</button>
    </div>

    <script>
    // 처음에는 빈 오디오 객체만 만들어 둡니다. (카톡이 마음대로 미리 재생하는 걸 원천 차단)
const michaelAudio = new Audio();
const clubMusic = new Audio();

function startFortuneFlow() {
    // 사용자가 쿠키를 터치한 '이 순간', 모바일 브라우저에 "나 나중에 소리 쓸 거야"라고 허락만 받습니다.
    // 빈 오디오를 재생(play) 시켰다가 즉시 멈춰서 오디오 잠금만 해제합니다.
    michaelAudio.play().then(() => { michaelAudio.pause(); }).catch(e => console.log(e));
    clubMusic.play().then(() => { clubMusic.pause(); }).catch(e => console.log(e));

    // 중복 클릭 방지
    document.getElementById("cookie").style.pointerEvents = "none";
    
    // 1. 운세 문구 즉시 출력
    showFortune();
    
    // 2. 1.5초 지연 후 마이클 스콧 등장 및 소리 재생
    setTimeout(() => {
        playMichael();
    }, 1500);
}

function showFortune() {
    const fortunes = [
        "You will die.",
        "The fortune you seek is in another cookie.",
        "The end is near.",
        "Never happening.",
        "Error 404: Fortune Not Found."
    ];
    const random = fortunes[Math.floor(Math.random() * fortunes.length)];
    const fortuneBox = document.getElementById("fortuneBox");
    
    fortuneBox.innerHTML = random;
    fortuneBox.style.display = "block";
}

function playMichael() {
    // 진짜 재생해야 하는 '지금 이 타이밍'에 음원 주소를 넣어줍니다.
    michaelAudio.src = "./thats-what-she-said.mp3";
    michaelAudio.play().catch(e => console.log("마이클 오디오 에러:", e));

    const face = document.getElementById("michaelFace");
    face.style.display = "block";
    face.style.animation = "boom 0.8s forwards";
    
    setTimeout(() => {
        face.style.animation = "fadeOut 0.3s forwards";
        setTimeout(() => { face.style.display = "none"; }, 300);

        document.getElementById("monkey").style.display = "block";
        document.getElementById("toilet").style.display = "block";
        
        startPoopDrop();
    }, 2300); 
}

function startPoopDrop() {
    let count = 0;
    const poopTrack = document.getElementById("poopTrack");
    poopTrack.innerHTML = "";

    const interval = setInterval(() => {
        count++;
        
        const poop = document.createElement("div");
        poop.className = "falling-poop";
        poop.innerHTML = "💩";
        
        poopTrack.appendChild(poop);

        if (count === 3) {
            clearInterval(interval);
            
            setTimeout(() => {
                const flushBtn = document.getElementById("flushBtn");
                flushBtn.style.display = "inline-block";
                flushBtn.style.animation = "pulse 1s infinite";
            }, 600);
        }
    }, 1000);
}

function flushToilet() {
    document.body.classList.add("club");
    
    document.getElementById("flushBtn").style.display = "none";
    document.getElementById("toilet").style.animation = "flushShake 0.3s infinite";
    
    document.getElementById("monkey").style.animation = "fadeOut 0.5s forwards";
    document.getElementById("poopTrack").style.animation = "fadeOut 0.5s forwards";

    // 변기 물을 내리는 '지금 이 타이밍'에 클럽 음악 주소를 넣고 재생합니다.
    clubMusic.src = "./clubmusic.mp3";
    clubMusic.play().catch(e => console.log("클럽 음악 에러:", e));

    clubMusic.onended = function() {
        document.body.classList.remove("club");
        document.getElementById("toilet").style.animation = "none";
        document.getElementById("toilet").style.display = "none";
        document.getElementById("monkey").style.display = "none";
        document.getElementById("monkey").style.animation = "none";
        document.getElementById("poopTrack").innerHTML = "";
        document.getElementById("poopTrack").style.animation = "none";
        document.getElementById("cookie").style.pointerEvents = "auto"; 
        document.getElementById("fortuneBox").style.display = "none";
        
        // 다음 판을 위해 주소 초기화
        michaelAudio.src = "";
        clubMusic.src = "";
    };
}
    </script>
</body>
</html>
