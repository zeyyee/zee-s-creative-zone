<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Fortune Chaos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1 class="title">🥠 Today's Fortune 🥠</h1>

    <div class="cookie-container">
        <img src="./cookie.png" id="cookie" onclick="startFortuneFlow()" alt="Fortune Cookie">
    </div>

    <div id="fortuneBox"></div>

    <img src="./michael.png" id="michaelFace" alt="Michael Scott">

    <div id="interactionZone">
        <div id="monkey">🐒</div>
        <div id="poopTrack"></div>
        <div id="toilet">🚽</div>
        <button id="flushBtn" onclick="flushToilet()">Flush</button>
    </div>

    <!-- [신규] 클럽 음악 종료 후 나타날 질문 및 버튼 구역 -->
    <div id="questionZone">
        <h2 id="questionText">Did you enjoy it? 😂</h2>
        <div class="btn-group">
            <button id="yesBtn" onclick="selectYes()">YES</button>
            <!-- PC(mouseover)와 모바일(touchstart) 둘 다 도망가도록 설정 -->
            <button id="noBtn" onmouseover="escapeNo()" ontouchstart="escapeNo(event)">NO</button>
        </div>
    </div>

    <!-- [신규] YES 클릭 시 나타날 최종 엔딩 구역 -->
    <div id="endingZone">
        <!-- 첨부하실 최종 사진 파일명을 아래 src에 맞춰주세요! -->
        <img src="./final-pic.png" id="finalPic" alt="Final Surprise">
    </div>

    <script>
    // 카톡 버그 방지용 빈 오디오 객체 사전 생성
    const michaelAudio = new Audio();
    const clubMusic = new Audio();
    const finalBgm = new Audio(); // 신규 최종 브금

    function startFortuneFlow() {
        // 첫 터치 때 브라우저에 오디오 권한 미리 획득 (잠금 해제)
        michaelAudio.play().then(() => { michaelAudio.pause(); }).catch(e => console.log(e));
        clubMusic.play().then(() => { clubMusic.pause(); }).catch(e => console.log(e));
        finalBgm.play().then(() => { finalBgm.pause(); }).catch(e => console.log(e));

        document.getElementById("cookie").style.pointerEvents = "none";
        showFortune();
        
        setTimeout(() => {
            playMichael();
        }, 1500);
    }

    function showFortune() {
        const fortunes = [
            "You will die.",
            "The fortune you seek is in another cookie.",
            "The end is near.",
            "Never happening.",
            "Error 404: Fortune Not Found."
        ];
        const random = fortunes[Math.floor(Math.random() * fortunes.length)];
        const fortuneBox = document.getElementById("fortuneBox");
        
        fortuneBox.innerHTML = random;
        fortuneBox.style.display = "block";
    }

    function playMichael() {
        michaelAudio.src = "./thats-what-she-said.mp3";
        michaelAudio.play().catch(e => console.log(e));

        const face = document.getElementById("michaelFace");
        face.style.display = "block";
        face.style.animation = "boom 0.8s forwards";
        
        setTimeout(() => {
            face.style.animation = "fadeOut 0.3s forwards";
            setTimeout(() => { face.style.display = "none"; }, 300);

            document.getElementById("monkey").style.display = "block";
            document.getElementById("toilet").style.display = "block";
            
            startPoopDrop();
        }, 2300); 
    }

    function startPoopDrop() {
        let count = 0;
        const poopTrack = document.getElementById("poopTrack");
        poopTrack.innerHTML = "";

        const interval = setInterval(() => {
            count++;
            
            const poop = document.createElement("div");
            poop.className = "falling-poop";
            poop.innerHTML = "💩";
            
            poopTrack.appendChild(poop);

            if (count === 3) {
                clearInterval(interval);
                
                setTimeout(() => {
                    const flushBtn = document.getElementById("flushBtn");
                    flushBtn.style.display = "inline-block";
                    flushBtn.style.animation = "pulse 1s infinite";
                }, 600);
            }
        }, 1000);
    }

    function flushToilet() {
        document.body.classList.add("club");
        
        document.getElementById("flushBtn").style.display = "none";
        document.getElementById("toilet").style.animation = "flushShake 0.3s infinite";
        
        document.getElementById("monkey").style.animation = "fadeOut 0.5s forwards";
        document.getElementById("poopTrack").style.animation = "fadeOut 0.5s forwards";

        clubMusic.src = "./clubmusic.mp3";
        clubMusic.play().catch(e => console.log(e));

        // 클럽 음악이 끝나면 실행될 이벤트
        clubMusic.onended = function() {
            document.body.classList.remove("club");
            
            // 기존 오브젝트들 깔끔하게 화면에서 숨기기
            document.getElementById("toilet").style.display = "none";
            document.getElementById("monkey").style.display = "none";
            document.getElementById("cookie").style.display = "none";
            document.getElementById("fortuneBox").style.display = "none";
            document.querySelector(".title").style.display = "none";
            
            // YES / NO 질문 구역 나타내기
            const questionZone = document.getElementById("questionZone");
            questionZone.style.display = "block";
        };
    }

    // [신규] NO 버튼 도망치기 함수
    function escapeNo(event) {
        if (event) event.preventDefault(); // 모바일 터치 시 스크롤 되거나 줌인되는 현상 방지
        
        const noBtn = document.getElementById("noBtn");
        
        // 버튼이 화면 밖으로 도망치지 않도록 안전 브라우저 너비/높이 계산
        const padding = 100;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;
        
        // 랜덤 좌표 생성 (최소값 50px 확보)
        const randomX = Math.max(50, Math.floor(Math.random() * maxX));
        const randomY = Math.max(50, Math.floor(Math.random() * maxY));
        
        // 버튼을 고정(fixed) 스타일로 바꾸고 랜덤 위치로 순간이동
        noBtn.style.position = "fixed";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
        noBtn.style.zIndex = "10000";
    }

    // [신규] YES 버튼 클릭 시 엔딩 함수
    function selectYes() {
        // 질문 구역 숨기기
        document.getElementById("questionZone").style.display = "none";
        
        // 엔딩 스크린 보이기
        const endingZone = document.getElementById("endingZone");
        endingZone.style.display = "block";
        
        // 사진 점점 투명도 서서히 차오르며 선명해지는 애니메이션 가동
        const finalPic = document.getElementById("finalPic");
        finalPic.style.animation = "fadeInPic 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards";
        
        // 최종 첨부하실 브금 파일 로드 및 재생
        finalBgm.src = "./final-bgm.mp3";
        finalBgm.play().catch(e => console.log("최종 브금 에러:", e));
    }
    </script>
</body>
</html>
